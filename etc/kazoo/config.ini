;------------------------------------------------------------------------------
; Logging
;------------------------------------------------------------------------------

; Available logging levels:
;   none, debug, info, notice, warning, error, critical, alert, emergency

[log]
; Syslog level (default: info)
syslog = info
; Console level (default: info)
console = info
; Error level (default: error)
error = error

;------------------------------------------------------------------------------
; Zones
;------------------------------------------------------------------------------

; Each [zone] must have a unique "name" and one or more "amqp_uri" lines.
; Additional brokers can be added for HA by adding additional "amqp_uri" lines.
; Optional "mgt_url": ACDC uses it if present, otherwise falls back to a URL
; derived from the broker URI, or a built-in default.

; First Zone
[zone]
name = zone1
amqp_uri = "amqp://guest:guest@127.0.0.1:5672"
;mgt_url = "http://guest:guest@127.0.0.1:15672"

; Second Zone
;[zone]
;name = zone2
;amqp_uri = "amqp://guest:guest@rabbitmq1.zone2.example.com:5672"
;amqp_uri = "amqp://guest:guest@rabbitmq2.zone2.example.com:5672"

;------------------------------------------------------------------------------
; AMQP
;------------------------------------------------------------------------------

[amqp]
; Channel QoS for unnamed/temporary queues
prefetch = 50
; Connection pool
pool_size = 150
pool_overflow = 100
pool_threshold = 5
pool_server_confirms = false

;------------------------------------------------------------------------------
; Database
;------------------------------------------------------------------------------

[data]
config = couchdb

[couchdb]
ip = "127.0.0.1"
port = 15984
username = "kazoo"
password = "change_me"
admin_port = 5986
cookie = change_me

;------------------------------------------------------------------------------
; kazoo_apps VM
;------------------------------------------------------------------------------

; "zone" must match one of the defined zone "name"s above.

[kazoo_apps]
zone = zone1
cookie = change_me

;------------------------------------------------------------------------------
; ecallmgr VM
;------------------------------------------------------------------------------

; "zone" must match one of the defined zone "name"s above.

[ecallmgr]
zone = zone1
cookie = change_me
